<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecasting App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <main class="weather-background">
        <div class="overlay"></div>
        <section class="weather-dashboard">
            <div class="weather-card glass-effect">
                <div class="top">
                    <button id="switch-degree"><i class="ri-celsius-fill"></i></button>
                    <div class="search-bar">
                        <input type="text" id="search-input" name="search-input" placeholder="Location...">
                        <button id="search">Search</button>
                    </div>
                </div>
                <div class="bottom" id="weather-data"></div>
            </div>
        </section>
        <aside class="forecasting-panel glass-effect">
            <h2>7 Days Forecast</h2>
            <div class="forecasting-panel-dets"></div>
        </aside>
    </main>
    <script src="script.js"></script>
</body>

</html>
